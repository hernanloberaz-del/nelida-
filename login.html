<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nélida AI - Login</title>
    <style>
        * { margin: 0 !important; padding: 0 !important; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        .pantalla-completa { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; }
        .img-fondo { width: 100%; height: 100%; object-fit: fill; position: absolute; top: 0; left: 0; z-index: 1; }
        .hitbox {
            position: absolute;
            left: 19.5%;
            transform: translateX(-50%);
            width: 32%; 
            height: 7.5%;
            background: transparent;
            border: none;
            cursor: pointer;
            border-radius: 30px;
            z-index: 10;
            outline: none !important;
            box-shadow: none !important;
            -webkit-tap-highlight-color: transparent;
        }
        .google { top: 50.8%; }
        .facebook { top: 61.2%; }
        .apple { top: 71.8%; }
    </style>
</head>
<body>
    <div class="pantalla-completa">
        <img src="2.png" class="img-fondo">
        <button onclick="irAMenu()" class="hitbox google"></button>
        <button onclick="irAMenu()" class="hitbox facebook"></button>
        <button onclick="irAMenu()" class="hitbox apple"></button>
    </div>

    <script>
        function irAMenu() {
            window.location.href = 'menu.html';
        }
    </script>
</body>
</html>
