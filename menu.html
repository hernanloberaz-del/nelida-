<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nélida AI - Menú</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #000;
            display: flex;
            justify-content: center;
            min-height: 100vh; 
            overflow-y: auto; 
        }

        .contenedor-imagen {
            position: relative;
            width: 100%;
            max-width: 800px; 
        }

        .imagen-fondo {
            width: 100%;
            display: block;
            height: auto;
        }

        .capa-botones {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 15% 18% 18% 18% 1fr; 
            
            padding-top: 80px; 
            padding-left: 20px;
            padding-right: 20px;
            gap: 10px;
        }

        .boton-clic {
            /* HACEMOS LOS BOTONES INVISIBLES */
            background: transparent; 
            border: none;
            
            cursor: pointer;
            border-radius: 10px;
            width: 90%;
            height: 80%;
            justify-self: center;
            align-self: center;
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* Quitamos el texto (números) para que no se vean */
            color: transparent; 
        }

        .boton-diez {
            margin-top: 40px; 
        }

        .vacio { visibility: hidden; }

        /* Eliminamos también el efecto visual al pasar el mouse */
        .boton-clic:hover {
            background: rgba(255, 255, 255, 0.05); /* Un brillo casi imperceptible para feedback */
        }
    </style>
</head>
<body>

    <div class="contenedor-imagen">
        <img src="3.1.png" class="imagen-fondo">
        
        <div class="capa-botones">
            <div class="boton-clic" onclick="elegir('nelida trainner')"></div>
            <div class="boton-clic" onclick="elegir('ayuda')"></div>
            <div class="boton-clic" onclick="elegir('ARTES MARCIALES MIXTAS')"></div>
            
            <div class="boton-clic" onclick="elegir('maestra')"></div>
            <div class="boton-clic" onclick="elegir('infantes')"></div>
            <div class="boton-clic" onclick="elegir('padel')"></div>
            
            <div class="boton-clic" onclick="elegir('sexologa')"></div>
            <div class="boton-clic" onclick="elegir('medica')"></div>
            <div class="boton-clic" onclick="elegir('tenis')"></div>
            
            <div class="vacio"></div>
            <div class="boton-clic boton-diez" onclick="elegir('psicologa')"></div>
            <div class="vacio"></div>
        </div>
    </div>

    <script>
        function elegir(nombre) {
            window.location.href = 'interaccion.html?especialidad=' + encodeURIComponent(nombre);
        }
    </script>
</body>
</html>
